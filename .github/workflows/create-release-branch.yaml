name: Create new release branch

on:
  workflow_dispatch:
    inputs:
      new_branch:
        description: 'Name of the new branch to create'
        required: true
      source_branch:
        description: 'Name of the source branch to create from (default: main)'
        required: false
        default: 'main'

jobs:
  create-branch:
    name: Create release branch
    runs-on: ubuntu-latest
    env:
      GITHUB_FORK_USER: akrejcir
      # Use a unique name for the branch
      GITHUB_FORK_BRANCH_NAME: "ssp-workflow/add-ci-${{ inputs.new_branch }}/id-${{ github.run_id }}-${{ github.run_number }}"
      COMMIT_MESSAGE: "kubevirt: ssp: add CI for branch \"${{ inputs.new_branch }}\""
    steps:
      - name: Create new branch
        uses: actions/github-script@v7
        with:
          # TODO -- authenticate using token for this workflow
          script: |
            const newBranch = "${{ inputs.new_branch }}";
            const sourceBranch = "${{ inputs.source_branch }}";

            const sourceRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${sourceBranch}`
            });

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${newBranch}`,
              sha: sourceRef.data.object.sha
            });

            console.log(`Branch '${newBranch}' created from '${sourceBranch}'`);

      - name: Checkout openshift/release repo
        run: |
          git clone https://${GITHUB_FORK_USER}:${{ secrets.ACTIONS_TOKEN }}@github.com/openshift/release
          
          cd release
          git remote add fork https://github.com/${GITHUB_FORK_USER}/release
          git checkout -b add-ci origin/master

      - name: Create CI config for new branch
        working-directory: release
        run: |
          cp "ci-operator/config/kubevirt/ssp-operator/kubevirt-ssp-operator-${{ inputs.source_branch }}.yaml" "ci-operator/config/kubevirt/ssp-operator/kubevirt-ssp-operator-${{ inputs.new_branch }}.yaml"
          sed -i "s/\b$ { inputs.source_branch }}\b/${{ inputs.new_branch }}/g" myfile.txt

      - name: Update CI job definitions
        working-directory: release
        run: make update

      - name: Commit changes and push to a fork
        working-directory: release
        run: |
          git add -A
          git config --global user.email "akrejcir@redhat.com"
          git config --global user.name "SSP Operator Automation"
          git commit --signoff --message="${COMMIT_MESSAGE}"
          git push fork HEAD:${GITHUB_FORK_BRANCH_NAME}

      - name: Post a PR to openshift/release repository from the fork
        # TODO -- post the PR and add me as a reviewer, so I notice it
        uses: actions/github-script@v7
        with:
          # TODO -- vv
          script: |
            const createPR = await github.rest.pulls.create({
              owner: TODO,
              repo: TODO,
              title: TODO,
              body: TODO,
              head: TODO,
              base: TODO
            });
